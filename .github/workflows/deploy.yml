name: Deploy Vite Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Tells Node where to look for package-lock.json for caching
          cache-dependency-path: '../portfolio-26/package-lock.json'

      - name: Install dependencies
        working-directory: ../portfolio-26
        run: npm ci

      - name: Build site
        working-directory: ../portfolio-26
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tells GitHub to look inside the subfolder's dist directory
          path: '../portfolio-26/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
