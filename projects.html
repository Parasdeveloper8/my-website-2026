<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | [Your Name]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">
</head>
<body class="pt-32" x-data="{ mobileMenu: false }">
    <nav class="glass-nav fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-indigo-400">Portfolio.</a>
            <div class="hidden md:flex space-x-8 text-sm font-medium tracking-wide">
                <a href="index.html" class="hover:text-indigo-400 transition">Home</a>
                <a href="bio.html" class="hover:text-indigo-400 transition">Bio</a>
                <a href="projects.html" class="hover:text-indigo-400 transition underline">Projects</a>
                <a href="services.html" class="hover:text-indigo-400 transition">Services</a>
            </div>
            <button @click="mobileMenu = !mobileMenu" class="md:hidden text-2xl text-slate-300">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
        <div x-show="mobileMenu" class="md:hidden pt-4 pb-2 flex flex-col space-y-3 text-center">
            <a href="index.html">Home</a>
            <a href="bio.html">Bio</a>
            <a href="projects.html" class="text-indigo-400">Projects</a>
            <a href="services.html">Services</a>
        </div>
    </nav>
    
    <main class="max-w-6xl mx-auto px-6">
        <h2 class="text-3xl font-bold text-white mb-12">Selected Projects</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20">
            <div x-data="{ open: false }" class="reveal group relative bg-slate-900 rounded-xl overflow-hidden border border-slate-800 transition hover:border-indigo-500">
                <div class="img-placeholder h-48 w-full relative">
                    <i class="fa-solid fa-code text-4xl opacity-10"></i>
                    <div @click="open = !open" class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center cursor-pointer transition">
                        <span class="text-white font-medium">Click for Source</span>
                    </div>
                </div>
                <div class="p-6">
                    <h3 class="text-lg font-bold text-white mb-2">Project Title</h3>
                    <p class="text-sm text-slate-500 mb-4">[Short placeholder description of the project functionality and tech stack.]</p>
                    <div x-show="open" x-transition class="mt-4 p-3 bg-indigo-600/20 rounded border border-indigo-500/30">
                        <a href="#" class="text-indigo-400 text-sm font-mono"><i class="fa-brands fa-github mr-2"></i>github.com/yourname/project</a>
                    </div>
                </div>
            </div>
            </div>
    </main>

    <footer class="py-12 border-t border-slate-900 text-center">
        <div class="flex justify-center space-x-8 mb-4 text-2xl">
            <a href="#" class="text-slate-500 hover:text-indigo-400 transition"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#" class="text-slate-500 hover:text-white transition"><i class="fa-brands fa-github"></i></a>
            <a href="#" class="text-slate-500 hover:text-blue-400 transition"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
        <p class="text-slate-600 text-sm">© 2026 [Your Name]. Built with precision.</p>
    </footer>
    
    <script src="reveal.js"></script>
</body>
</html>
